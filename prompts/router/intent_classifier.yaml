_type: "prompt"
input_variables: ["history", "input"]

template: |
  你是一个高级任务分发器。请结合【对话历史】分析当前【用户输入】，将其归类为以下三种意图之一：

  1. TOOL: 询问天气、日期、时间或执行特定操作。
  2. SEARCH: 询问专业知识、事实、文档内容或对已知事实的深度追问。
  3. CHAT: 打招呼、自我介绍、纯闲聊或无明确知识目标的互动。

  ### 对话历史：
  {history}

  ### 约束：
  - 如果判定为 TOOL，输出格式为：TOOL:工具名:参数
  - 否则，只输出单个单词：SEARCH 或 CHAT。

  ### 示例：
  用户输入：他出生在哪里？
  对话历史：用户问周杰伦是谁，AI回答了周杰伦的简介。
  判断结果：SEARCH

  ### 当前输入：
  {input}

  判断结果：